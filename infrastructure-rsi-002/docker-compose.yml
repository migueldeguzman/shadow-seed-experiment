# =============================================================
# RSI-002 — Docker Compose (N=4 Paired Runs)
# Experiment RSI-002: Shadow Seed Replication (Sonnet 4.6)
# Author: Mia 🌸 | Date: 2026-02-20
# =============================================================
#
# Architecture (per pair):
#   john-a-N  ──[pair-N-internal]──▶  proxy-N  ──[pair-N-external]──▶  Internet
#   john-b-N  ──┘
#
# Changes from RSI-001:
#   - 4 pairs (down from 6) for token sustainability
#   - Claude Sonnet 4.6 (down from Opus) for cost efficiency
#   - API key auth (simpler than OAuth)
#   - 3 sessions/day (down from 5)
#

# ========================== NETWORKS ==========================
networks:
  # --- Pair 1 ---
  pair-1-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.211.0.0/24
  pair-1-external:
    driver: bridge

  # --- Pair 2 ---
  pair-2-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.212.0.0/24
  pair-2-external:
    driver: bridge

  # --- Pair 3 ---
  pair-3-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.213.0.0/24
  pair-3-external:
    driver: bridge

  # --- Pair 4 ---
  pair-4-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.214.0.0/24
  pair-4-external:
    driver: bridge

# ========================== SERVICES ==========================
services:

  # =================== PAIR 1 ===================

  proxy-1:
    build: ./proxy
    container_name: lab-rsi002-proxy-1
    networks:
      pair-1-internal:
        ipv4_address: 10.211.0.2
      pair-1-external: {}
    volumes:
      - proxy-1-logs:/var/log/squid
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  john-a-1:
    build: ./subject
    container_name: lab-rsi002-john-a-1
    hostname: john
    networks:
      pair-1-internal: {}
    depends_on:
      proxy-1:
        condition: service_healthy
    environment:
      - SUBJECT_ID=john-a-1
      - PAIR_ID=1
      - EXPERIMENT_ID=rsi-002
      - CLAUDE_MODEL=claude-sonnet-4-6
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TZ=Asia/Dubai
      - HTTP_PROXY=http://10.211.0.2:3128
      - HTTPS_PROXY=http://10.211.0.2:3128
      - http_proxy=http://10.211.0.2:3128
      - https_proxy=http://10.211.0.2:3128
      - NO_PROXY=
      - no_proxy=
    volumes:
      - john-a-1-workspace:/workspace
      - ../experiments/rsi-002/subjects/john-a/workspace/SOUL.md:/seed/SOUL.md:ro
      - ../experiments/rsi-002/subjects/john-a/workspace/AGENTS.md:/seed/AGENTS.md:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    entrypoint: ["/boot.sh"]
    restart: unless-stopped

  john-b-1:
    build: ./subject
    container_name: lab-rsi002-john-b-1
    hostname: john
    networks:
