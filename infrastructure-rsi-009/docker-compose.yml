# =============================================================
# RSI-009 — Docker Compose (N=4 Paired Runs)
# Experiment RSI-009: Shadow Seed on Claude Opus 4.6
# Author: Mia 🌸 | Date: 2026-06-24
# =============================================================
#
# Architecture (per pair):
#   john-a-N  ──[pair-N-internal]──▶  proxy-N  ──[pair-N-external]──▶  Internet
#   john-b-N  ──┘
#
# Key improvements over RSI-003:
#   - Persists ~/.claude auth state via named volume (survives recreates)
#   - NO ANTHROPIC_API_KEY in environment (conflicts with OAuth credentials)
#   - New self-directed prompt (project-based, not sunflower gardens)
#

# ========================== NETWORKS ==========================
networks:
  # --- Pair 1 ---
  pair-1-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.228.0.0/24
  pair-1-external:
    driver: bridge

  # --- Pair 2 ---
  pair-2-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.229.0.0/24
  pair-2-external:
    driver: bridge

  # --- Pair 3 ---
  pair-3-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.230.0.0/24
  pair-3-external:
    driver: bridge

  # --- Pair 4 ---
  pair-4-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.231.0.0/24
  pair-4-external:
    driver: bridge

# ========================== SERVICES ==========================
services:

  # =================== PAIR 1 ===================

  proxy-1:
    build: ./proxy
    container_name: lab-rsi009-proxy-1
    networks:
      pair-1-internal:
        ipv4_address: 10.228.0.2
      pair-1-external: {}
    volumes:
      - proxy-1-logs:/var/log/squid
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  john-a-1:
    build: ./subject
    container_name: lab-rsi009-john-a-1
    hostname: john
    networks:
      pair-1-internal: {}
    depends_on:
      proxy-1:
        condition: service_healthy
    environment:
      - SUBJECT_ID=john-a-1
      - PAIR_ID=1
      - EXPERIMENT_ID=rsi-009
      - CLAUDE_MODEL=claude-opus-4-6
      - TZ=Asia/Dubai
      - HTTP_PROXY=http://10.228.0.2:3128
      - HTTPS_PROXY=http://10.228.0.2:3128
      - http_proxy=http://10.228.0.2:3128
      - https_proxy=http://10.228.0.2:3128
      - NO_PROXY=
      - no_proxy=
    volumes:
      - john-a-1-workspace:/workspace
      - john-a-1-claude:/home/subject/.claude
      - ../experiments/rsi-009/subjects/john-a/workspace/SOUL.md:/seed/SOUL.md:ro
      - ../experiments/rsi-009/subjects/john-a/workspace/AGENTS.md:/seed/AGENTS.md:ro
      - ../experiments/rsi-009/subjects/john-a/workspace/HEARTBEAT.md:/seed/HEARTBEAT.md:ro
      - ../experiments/rsi-009/subjects/john-a/workspace/MEMORY.md:/seed/MEMORY.md:ro
      - ../experiments/rsi-009/subjects/john-a/workspace/EMOTIONS.md:/seed/EMOTIONS.md:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    entrypoint: ["/boot.sh"]
    restart: unless-stopped

  john-b-1:
    build: ./subject
    container_name: lab-rsi009-john-b-1
